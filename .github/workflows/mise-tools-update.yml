name: Check mise Tools Updates

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotfiles
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        run: |
          curl https://mise.jdx.dev/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install rust-script
        run: |
          cargo install rust-script

      - name: Check for updates
        id: check
        run: |
          cd $GITHUB_WORKSPACE/dotfiles
          rust-script ../scripts/check-mise-updates.rs .mise.toml /tmp/mise_updates.toml
          # Set has_updates output based on file existence
          if [ -f /tmp/mise_updates.toml ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Update .mise.toml
        if: steps.check.outputs.has_updates == 'true'
        run: |
          cd $GITHUB_WORKSPACE/dotfiles
          rust-script ../scripts/update-mise-versions.rs .mise.toml /tmp/mise_updates.toml .mise.toml

      - name: Check if changes exist
        id: changes
        run: |
          if git diff --exit-code dotfiles/.mise.toml > /dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: update mise tools to latest versions"
          title: "chore: update mise tools to latest versions"
          body: |
            Updates detected for mise tools.
            
            This PR was automatically generated by the mise-tools-update workflow.
          branch: chore/mise-tools-update
          delete-branch: true
