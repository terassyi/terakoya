name: Update mise tools

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-mise-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check for outdated tools
        id: check
        run: |
          mise trust
          cd dotfiles
          mise install
          OUTDATED=$(mise outdated)
          if [ -n "$OUTDATED" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "outdated<<EOF" >> $GITHUB_OUTPUT
            echo "$OUTDATED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Update tools
        if: steps.check.outputs.has_updates == 'true'
        run: |
          cd dotfiles
          mise upgrade

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update mise tools to latest versions'
          title: 'chore: update mise tools'
          body: |
            ## Outdated tools

            This PR updates the following mise-managed tools to their latest versions:

            ```
            ${{ steps.check.outputs.outdated }}
            ```

            ---
            *This PR was automatically created by the mise-update workflow.*
          branch: mise-update-tools
          delete-branch: true
          labels: dependencies,automated
